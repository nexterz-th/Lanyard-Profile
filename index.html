  <style>
    :root {
      --bg: #0b0f12;
      --muted: #9aa4ad;
      --accent: #ff4d6d;
      --green: #43b581;
      --yellow: #faa61a;
      --red: #f04747;
      --offline: #6f7780;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    html,
    body {
      height: 100%;
      min-height: 100vh;
      /* เพิ่ม */
    }

    body {
      margin: 0;
      height: 100%;
      min-height: 100vh;
      font-family: "IBM Plex Sans Thai", sans-serif;
      font-weight: 400;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px;
      box-sizing: border-box;
      background: #000000;
      /* สีดำพื้นหลัง */
      color: #e6eef6;
      position: relative;
      overflow-x: hidden;
      overscroll-behavior: none;
      /* ลดอาการ overscroll glow */
    }

    .bg-fixed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.nexterz.com/images/2025/02/14/bgdark.png') center center / cover no-repeat;
      z-index: -999;
      pointer-events: none;
      transform: translateZ(0);
      /* บังคับ GPU render ให้ smooth */
      will-change: transform;
      /* เตือน browser ว่าจะเปลี่ยน transform */
      filter: blur(10px);
      /* เพิ่มเบลอ */
    }

    .container {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      min-height: 100%;
      /* เพิ่ม */
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      /* หรือ gradient เบาๆ */
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 6px 30px rgba(2, 6, 10, 0.6);
      /* ถ้าต้องการ depth */
      border-radius: 14px;
      padding: 18px;
    }

    .profile {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      text-align: center;
      align-self: start;
    }

    .avatar-wrapper {
      position: relative;
      width: 150px;
      height: 150px;
    }

    .name-row {
      margin-top: 22px;
      /* เว้นที่ให้ status badge ที่ลอยทับขอบล่างรูป */
      text-align: center;
      /* จัดกล่องชื่อ (inline-block) ให้อยู่กึ่งกลาง */
    }

    .avatar {
      position: relative;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 30px rgba(3, 8, 12, 0.7);
      background: linear-gradient(180deg, #0b0f12, rgba(255, 255, 255, 0.01));
    }


    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      flex-shrink: 0;
      border-radius: 50%;
      background: var(--offline);
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .activities {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .activity {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.015), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .activity .icon {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.04));
    }

    .activity h4 {
      margin: 0;
      font-size: 15px;
    }

    .activity p {
      margin: 4px 0 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .spotify {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      background: linear-gradient(90deg, rgba(67, 181, 129, 0.06), rgba(255, 255, 255, 0.01));
    }

    .spotify .meta {
      min-width: 150px;
    }

    .spotify .cover {
      position: relative;
      width: 66px;
      height: 66px;
      border-radius: 8px;
      overflow: hidden;
    }

    .pause-overlay {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 18px;
    }

    .spotify .meta h4 {
      margin: 0;
      font-size: 15px;
    }

    .spotify .meta p {
      margin: 6px 0 0 0;
      color: var(--muted);
      font-size: 13px;
      word-wrap: break-word;
      /* ตัดคำยาว ๆ ให้อยู่บรรทัดใหม่ */
      overflow-wrap: anywhere;
      /* รองรับคำยาวมาก ๆ */
      white-space: normal;
      /* ให้ข้อความ wrap ตามปกติ */
    }

    .progress {
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress .bar {
      height: 100%;
      width: 0%;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--green), #6ddd9b);
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .pulse {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.015), rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
      background-size: 200% 100%;
      animation: pulse 1.8s linear infinite;
    }

    @keyframes pulse {
      from {
        background-position: 200% 0
      }

      to {
        background-position: -200% 0
      }
    }

    @keyframes trackChange {
      0% {
        opacity: 0;
        transform: translateY(6px) scale(0.98);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .track-changed {
      animation: trackChange 0.45s ease;
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .reveal.in-view {
      opacity: 1;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {

      .reveal,
      .track-changed {
        animation: none !important;
        transition: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }

    .discord-btn {
      display: inline-flex;
      align-items: center;
      /* จัดให้ไอคอนและข้อความอยู่กึ่งกลางแนวตั้ง */
      justify-content: center;
      /* จัดกึ่งกลางแนวนอน */
      gap: 6px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: #5865F2;
      border-radius: 8px;
      text-decoration: none;
      line-height: 1;
      /* เพิ่มตรงนี้ให้ข้อความอยู่ตรงกลาง */
    }

    .discord-btn i {
      font-size: 16px;
      display: flex;
      /* ทำให้ไอคอนเป็น flex */
      align-items: center;
      /* จัดไอคอนตรงกลางแนวตั้ง */
    }

    .social-link.icon-fb:hover {
      background: #1877F2;
      border-color: #1877F2;
      color: #fff;
    }

    .social-link.icon-x:hover {
      background: #000000;
      border-color: #3a3a3a;
      color: #fff;
    }

    .social-link.icon-ig:hover {
      background: linear-gradient(135deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
      border-color: transparent;
      color: #fff;
    }

    .social-link.icon-yt:hover {
      background: #FF0000;
      border-color: #FF0000;
      color: #fff;
    }

    .email-btn {
      display: inline-flex;
      align-items: center;
      /* จัดข้อความและไอคอนตรงกลางแนวตั้ง */
      justify-content: center;
      /* กึ่งกลางแนวนอน */
      gap: 6px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: #ed4545;
      /* สีแดงพื้นฐาน */
      border-radius: 8px;
      text-decoration: none;
      line-height: 1;
      /* ทำให้ข้อความอยู่ตรงกลาง */
      transition: background 0.2s ease;
    }

    .email-btn:hover {
      background: #c44747;
      /* สีแดงเข้มเมื่อ hover */
    }

    .email-btn i {
      font-size: 16px;
      display: flex;
      /* จัดไอคอนเป็น flex */
      align-items: center;
      /* จัดไอคอนตรงกลางแนวตั้ง */
    }

    .contact-links {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px;
      display: flex !important;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
      backdrop-filter: blur(6px);
      width: 100%;
      /* เต็ม container */
      box-sizing: border-box;
    }

    .social-title {
      font-weight: 700;
      font-size: 14px;
      color: #e6eef6;
      text-align: center;
      margin-bottom: 4px;
    }

    .social-container {
      margin-top: 8px;
      display: flex;
      justify-content: center;
      /* จัดให้อยู่ตรงกลางแนวนอน */
      align-items: center;
      /* จัดกึ่งกลางแนวตั้ง */
      gap: 6px;
      flex-wrap: wrap;
      /* ให้ไอคอนขึ้นบรรทัดใหม่ได้ */
      width: 100%;
      /* เต็มความกว้าง */
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      font-size: 16px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.07);
      text-decoration: none;
      border-radius: 10px;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
    }

    .social-link:hover {
      transform: translateY(-2px);
    }

    .custom-state-wrapper {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-top: 40px;
      /* เพิ่มจากเดิมเพื่อเลื่อนลง */
      width: 100%;
    }

    .custom-state-title {
      font-weight: 700;
      font-size: 14px;
      color: #e6eef6;
      text-align: center;
      margin-bottom: 4px;
      /* ลดระยะระหว่างหัวข้อกับไอคอน */
    }

    .custom-state {
      display: flex;
      align-items: center;
      gap: 8px;
      /* เพิ่มระยะห่างระหว่าง emoji กับข้อความ */
      flex-wrap: wrap;
      /* ถ้าข้อความยาวเกิน จะขึ้นบรรทัดใหม่ */
      padding: 6px 12px;
      font-size: 15px;
      color: #e6eef6;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      backdrop-filter: blur(6px);
      width: 100%;
      box-sizing: border-box;
      justify-content: center;
      /* จัดให้อยู่ตรงกลาง */
    }

    .custom-state span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      /* ระยะระหว่าง emoji + text */
      flex-shrink: 1;
      /* อนุญาตให้ย่อได้ */
      word-break: break-word;
      /* ตัดคำยาว ๆ ลงบรรทัดใหม่ */
      white-space: normal;
      /* ปลดล็อคไม่ให้ force single line */
    }

    .custom-state img {
      width: 18px;
      /* ปรับขนาด emoji ให้สวย */
      height: 18px;
      vertical-align: middle;
      border-radius: 4px;
    }

    .displayname {
      font-weight: 700;
      font-size: 22px;
      color: #ffffff;
      /* สีขาวธรรมดา */
      display: inline-block;
      line-height: 1.2;
      /* ปรับให้ตัวหนังสือสูงพอดี */
      animation: none;
      /* ปิด animation ไล่สี */
    }

    .status-label {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translate(-50%, 50%);
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
      border-radius: 999px;
      border: 1px solid transparent;
      color: var(--offline);
      background: rgba(11, 15, 18, 0.92);
      backdrop-filter: blur(4px);
    }

    .status-label::before {
      content: "";
      width: 6px;
      height: 6px;
      flex-shrink: 0;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 6px currentColor;
    }

    .status-label.status-online {
      color: var(--green);
      border-color: rgba(67, 181, 129, 0.4);
    }

    .status-label.status-idle {
      color: var(--yellow);
      border-color: rgba(250, 166, 26, 0.4);
    }

    .status-label.status-dnd {
      color: var(--red);
      border-color: rgba(240, 71, 71, 0.4);
    }

    .status-label.status-offline {
      color: var(--offline);
      border-color: rgba(111, 119, 128, 0.4);
    }

    .gray-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: #444;
      /* สีเทาหลัก */
      border-radius: 8px;
      text-decoration: none;
      line-height: 1;
      transition: background 0.2s ease;
    }

    .gray-btn:hover {
      background: #666;
      /* สีเทาอ่อนขึ้นตอน hover */
    }

    .gray-btn i {
      font-size: 16px;
      display: flex;
      align-items: center;
    }

    @media (max-width:880px) {
      .container {
        grid-template-columns: 1fr;
      }

      .avatar-wrapper {
        width: 170px;
        height: 170px;
      }

      .profile {
        align-items: center;
        /* จัดให้อยู่ตรงกลางแนวนอน */
        text-align: center;
        /* ทำให้ข้อความ displayname อยู่กลาง */
      }
    }

    .lang-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      display: flex;
      gap: 2px;
      padding: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(6px);
    }

    .lang-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 5px 10px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .lang-btn.active {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }

    /* overlay full screen */
    #loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* loader แบบ spinning */
    .loader {
      border: 6px solid rgba(255, 255, 255, 0.1);
      border-top: 6px solid var(--accent);
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>

        ws.onmessage = ev => { try { const m = JSON.parse(ev.data); if (m.op === 1 && m.d?.heartbeat_interval) { setInterval(() => ws.send(JSON.stringify({ op: 3 })), m.d.heartbeat_interval); ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: USER_ID } })); return; } if ((m.t === "INIT_STATE" || m.t === "PRESENCE_UPDATE") && m.d) { applyPresence(m.d); } } catch (e) { } };
        ws.onclose = () => { setConnectionInfo("wsClosed", true); setTimeout(connectWS, 3000); };
      }

      function applyPresence(p) { const mapped = { discord_user: p.discord_user, discord_status: p.discord_status, activities: p.activities, spotify: p.spotify || null }; renderProfile(mapped); renderActivities(mapped); renderSpotify(mapped.spotify); renderWatching((mapped.activities || []).find(a => a.type === 3)); }

      document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.addEventListener("click", () => setLang(btn.dataset.lang));
      });
      applyStaticTranslations();

      // เอฟเฟกต์ fade + เลื่อนขึ้นให้การ์ดตอนเลื่อนจอเข้ามาในมือถือ/เดสก์ท็อป
      if (!("IntersectionObserver" in window)) {
        document.querySelectorAll(".card").forEach(el => el.classList.add("reveal", "in-view"));
      } else {
        const revealObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add("in-view");
              revealObserver.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1, rootMargin: "0px 0px -40px 0px" });
        document.querySelectorAll(".card").forEach(el => {
          el.classList.add("reveal");
          revealObserver.observe(el);
          // เผื่อ IntersectionObserver ไม่ยอมยิง (บาง browser/สภาพแวดล้อม) การ์ดต้องไม่ค้างล่องหนตลอดไป
          setTimeout(() => el.classList.add("in-view"), 1500);
        });
      }

      fetchPresence(); setInterval(fetchPresence, 60000);
      connectWS();
      document.getElementById("avatarWrap").addEventListener("click", () => { window.open(`https://discord.com/users/${USER_ID}`, "_blank"); });
    })();

    socials.forEach(s => {

      a.innerHTML = `<i class="fab ${s.icon}"></i>`;
      socialContainer.appendChild(a);

  <script>
    class TextScramble {
      constructor(el) {
        this.el = el;
        this.chars = "!<>-_\\/[]{}—=+*^?#________";
        this.update = this.update.bind(this);
      }
      setText(newText) {
        const oldText = this.el.innerText;
        const length = Math.max(oldText.length, newText.length);
        const promise = new Promise((resolve) => this.resolve = resolve);
        this.queue = [];
        for (let i = 0; i < length; i++) {
          const from = oldText[i] || "";
          const to = newText[i] || "";
          const start = Math.floor(Math.random() * 40);
          const end = start + Math.floor(Math.random() * 40);
          this.queue.push({ from, to, start, end });
        }
        cancelAnimationFrame(this.frameRequest);
        this.frame = 0;
        this.update();
        return promise;
      }
      update() {
        let output = "";
        let complete = 0;
        for (let i = 0, n = this.queue.length; i < n; i++) {
          let { from, to, start, end, char } = this.queue[i];
          if (this.frame >= end) {
            complete++;
            output += to;
          } else if (this.frame >= start) {
            if (!char || Math.random() < 0.28) {
              char = this.randomChar();
              this.queue[i].char = char;
            }
            output += `<span style="color:#ffffff">${char}</span>`;
          } else {
            output += from;
          }
        }
        this.el.innerHTML = output;
        if (complete === this.queue.length) {
          this.resolve();
        } else {
          this.frameRequest = requestAnimationFrame(this.update);
          this.frame++;
        }
      }
      randomChar() {
        return this.chars[Math.floor(Math.random() * this.chars.length)];
      }
    }

    // ✅ ใช้กับ displayName
    document.addEventListener("DOMContentLoaded", () => {
      const el = document.getElementById("displayName");
      const fx = new TextScramble(el);

      const name = "NEXTERZ";

      // เล่น scramble ครั้งแรก
      fx.setText(name);

      // เล่นซ้ำทุก 5 วินาที
      setInterval(() => {
        fx.setText(name);
      }, 5000);
    });
  </script>
